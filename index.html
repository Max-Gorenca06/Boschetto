  <div id="sidebar">
    <h2>Personale</h2>
    <div id="sidebar-content">
      </div>
    
    <hr>
    <div style="display: flex; align-items: center; gap: 10px; font-size: 13px; color: #555;">
          <label for="start-date-picker"><strong>Giorno di partenza (Lunedì):</strong></label>
          <input type="date" id="start-date-picker" style="padding: 4px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer;">
      </div>
    <div class="controls">
      <button class="btn secondary" id="resetBtn">Reset Turni</button>
      <button id="printBtn" class="btn secondary">Stampa</button>
      <button id="export-pdf-btn" class="btn secondary">Esporta PDF</button>
      <button class="btn" id="manageStaffBtn">Gestisci Personale</button>
    </div>

    <div id="save-status" style="text-align: center; font-size: 11px; color: #666; margin-top: 15px; height: 15px;"></div>

  </div>

  <div id="main">
    <div class="header-container">
      <input type="text" id="table-header-title" placeholder="TURNI DAL ... AL ..." class="editable-title">
    </div>
    <table>
      <thead>
        <tr>
          <th>Turno / Giorno</th>
          <th>Lunedì</th>
          <th>Martedì</th>
          <th>Mercoledì</th>
          <th>Giovedì</th>
          <th>Venerdì</th>
          <th>Sabato</th>
          <th>Domenica</th>
        </tr>
      </thead>
      <tbody id="grid"></tbody>
    </table>
  </div>

  <!-- Modale per la gestione del personale -->
  <div id="staff-modal" class="modal">
    <div class="modal-content">
      <span class="close-button">&times;</span>
      <h2>Gestisci Personale</h2>
      <div id="staff-list-container">
        <!-- La lista del personale verrà inserita qui -->
      </div>
      <form id="staff-form" style="display: none;">
        <input type="hidden" id="original-name">
        <input type="text" id="staff-name" placeholder="Nome" required>
        <input type="number" id="staff-max-shifts" placeholder="Turni max" min="0" style="width: 80px;">
        <select id="staff-group" required>
          <option value="" disabled selected>Seleziona Gruppo</option>
          <option value="Camere">Camere</option>
          <option value="Cucina">Cucina</option>
          <option value="Sala">Sala</option>
        </select>
        <button type="submit" class="btn">Salva</button>
        <button type="button" class="btn secondary" id="cancel-edit">Annulla</button>
      </form>
      <div style="display: flex; gap: 10px; margin-top: 15px;">
        <button class="btn" id="add-new-staff-btn" style="flex-grow: 1;">Aggiungi Persona</button>
        <button class="btn secondary" id="export-staff-btn" style="flex-grow: 1;">Esporta Personale</button>
      </div>
    </div>
  </div>
  
  <!-- Collega il file JavaScript esterno -->
  <script src="script.js"></script>
</body>
</html>
