<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Turni Boschetto</title>
  
  <link rel="stylesheet" href="style_v2.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/default.css">
  <script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/scroll-behaviour-sink.min.js"></script>
</head>
<body>
  
  <div id="loading-spinner" class="loader" style="display: none;"></div>

  <div id="sidebar">
    <div id="auth-container" style="margin-bottom: 15px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; background: #f9f9f9;">
        <div id="login-form">
            <input type="email" id="login-email" placeholder="Email (Admin)" style="width: 100%; box-sizing: border-box; margin-bottom: 5px; padding: 5px;">
            <input type="password" id="login-password" placeholder="Password" style="width: 100%; box-sizing: border-box; margin-bottom: 8px; padding: 5px;">
            <button id="btn-login" style="width: 100%; cursor: pointer; padding: 5px; background: #007bff; color: white; border: none; border-radius: 3px;">Accedi per modificare</button>
        </div>
        <div id="logout-form" style="display: none; text-align: center;">
            <p style="font-size: 13px; margin: 0 0 8px 0; color: #28a745;"><strong>🔓 Accesso Admin attivo</strong></p>
            <button id="btn-logout" style="width: 100%; cursor: pointer; padding: 5px; background: #dc3545; color: white; border: none; border-radius: 3px;">Disconnetti e Blocca</button>
        </div>
    </div>

    <h3>Personale</h3>
    <div id="sidebar-content"></div>
    
    <div class="controls" style="margin-top: 20px; display: flex; flex-direction: column; gap: 8px;">
      <button class="btn secondary" id="resetBtn">Svuota Griglia</button>
      <button class="btn" id="manageStaffBtn">Gestisci Personale</button>
      <button class="btn" id="printBtn">Stampa</button>
      <button class="btn" id="export-pdf-btn">Esporta in PDF</button>
    </div>
  </div>

  <div id="main">
    <div class="header-container">
      <input type="text" id="table-header-title" class="editable-title" value="TURNI DAL LUNEDÌ ALLA DOMENICA">
      
      <div class="date-picker-container" style="margin-top: 10px; text-align: center;">
        <label for="start-date-picker">Seleziona il Lunedì:</label>
        <input type="date" id="start-date-picker">
        <span id="save-status" style="margin-left: 15px; font-size: 12px; color: #666;"></span>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Turno</th>
          <th>Lunedì</th>
          <th>Martedì</th>
          <th>Mercoledì</th>
          <th>Giovedì</th>
          <th>Venerdì</th>
          <th>Sabato</th>
          <th>Domenica</th>
        </tr>
      </thead>
      <tbody id="grid"></tbody>
    </table>

    <div id="mobile-view">
      <div class="mobile-day-selector">
        <button id="mobile-prev-day" class="btn secondary">&lt;</button>
        <h2 id="mobile-current-day">Oggi - Lunedì 13</h2>
        <button id="mobile-next-day" class="btn secondary">&gt;</button>
      </div>
      <div id="mobile-cards-container"></div>
    </div>
  </div>

  <div id="staff-modal" class="modal">
    <div class="modal-content">
      <span class="close-button">&times;</span>
      <h2>Gestisci Personale</h2>
      <div id="staff-list-container"></div>
      <form id="staff-form" style="display: none;">
        <input type="hidden" id="original-name">
        <input type="text" id="staff-name" placeholder="Nome" required>
        <input type="number" id="staff-max-shifts" placeholder="Turni max" min="0" style="width: 80px;">
        <select id="staff-group" required>
          <option value="" disabled selected>Seleziona Gruppo</option>
          <option value="Camere">Camere</option>
          <option value="Cucina">Cucina</option>
          <option value="Sala">Sala</option>
        </select>
        <button type="submit" class="btn">Salva</button>
        <button type="button" class="btn secondary" id="cancel-edit">Annulla</button>
      </form>
      <div style="display: flex; gap: 10px; margin-top: 15px;">
        <button class="btn" id="add-new-staff-btn" style="flex-grow: 1;">Aggiungi Persona</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
